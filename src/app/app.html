<div class="d-flex flex-column min-vh-100">

  <app-navbar></app-navbar>

  <!-- Sidebar + Content -->
  <div class="layout-wrapper d-flex flex-grow-1">

    <aside class="sidebar p-3" id="sidebarMenu">
      <h5>Sections</h5>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active" (click)="closeSidebar()">About Me</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/projects" routerLinkActive="active" (click)="closeSidebar()">Projects</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/skills" routerLinkActive="active" (click)="closeSidebar()">Skills & Tools</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/experience" routerLinkActive="active" (click)="closeSidebar()">Experience</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/education" routerLinkActive="active" (click)="closeSidebar()">Education</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active" (click)="closeSidebar()">Contact</a>
        </li>
      </ul>
    </aside>

    <div class="sidebar-overlay" (click)="closeSidebar()"></div>

    <main class="flex-grow-1 p-4 d-flex flex-column">

      <div class="flex-grow-1">
        <router-outlet></router-outlet>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-5"
           *ngIf="previousPage || nextPage">

        <div *ngIf="previousPage">
          <a [routerLink]="previousPage.path" class="nav-link-minimal">
            <i class="bi bi-chevron-left me-1"></i>
            {{ previousPage.label }}
          </a>
        </div>

        <div *ngIf="nextPage" class="ms-auto">
          <a [routerLink]="nextPage.path" class="nav-link-minimal">
            {{ nextPage.label }}
            <i class="bi bi-chevron-right ms-1"></i>
          </a>
        </div>

      </div>

    </main>

  </div>

  <app-footer></app-footer>

</div>
